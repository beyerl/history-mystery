<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{QUIZ_NAME}} — Video Check</title>
<!-- Migrated from gitlab.com/lenzbeyer/metal-mystery-test (#53). A standalone QA
     page for the audio quizzes: a chronological timeline of every track with a
     dropdown of its candidate YouTube clips and an inline player, so the video
     ids in each quiz's questions.js can be confirmed by ear. The {{...}} tokens
     and data.js are filled in per quiz by tools/build-tests.mjs. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#ece6da;
    --ink-dim:#b9b2a4;
    --bg:#0a0a0b;
    --bg-raised:#131314;
    --bg-card:#17161788;
    --red:#b6291c;
    --red-bright:#d8432f;
    --brass:#a98a4a;
    --steel:#37454c;
    --muted:#7d796f;
    --line:#272524;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(182,41,28,0.10), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(169,138,74,0.06), transparent 60%);
  }

  a{color:var(--red-bright);}

  /* ---------- Header ---------- */
  .site-head{
    padding:64px 24px 40px;
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  .site-head::before{
    content:"";
    position:absolute; inset:0;
    background-image:repeating-linear-gradient(180deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .head-inner{max-width:880px;margin:0 auto;position:relative;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--brass);
    text-transform:uppercase;
  }
  h1.title{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:clamp(44px,9vw,92px);
    line-height:0.92;
    letter-spacing:0.01em;
    margin:8px 0 14px;
    color:var(--ink);
    text-shadow:3px 3px 0 rgba(182,41,28,0.35);
  }
  .sub{
    font-size:15px;
    line-height:1.6;
    color:var(--ink-dim);
    max-width:560px;
    margin:0 0 28px;
  }
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  #search{
    flex:1 1 320px;
    background:var(--bg-raised);
    border:1px solid var(--line);
    color:var(--ink);
    padding:13px 16px;
    font-family:'Oswald',sans-serif;
    font-size:15px;
    letter-spacing:0.02em;
    border-radius:2px;
    outline:none;
  }
  #search::placeholder{color:var(--muted);}
  #search:focus{border-color:var(--brass);}
  #count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
  }

  /* ---------- Timeline ---------- */
  main{
    max-width:880px;
    margin:0 auto;
    padding:10px 24px 80px;
  }

  .decade{
    font-family:'Anton',sans-serif;
    font-size:clamp(40px,8vw,72px);
    color:transparent;
    -webkit-text-stroke:1.4px var(--steel);
    margin:56px 0 8px;
    letter-spacing:0.02em;
    user-select:none;
  }
  .decade:first-of-type{margin-top:28px;}

  .row{
    display:grid;
    grid-template-columns:64px 1fr;
    gap:18px;
    position:relative;
    padding:22px 0;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:none;}

  .yearcol{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--muted);
    padding-top:4px;
    position:relative;
  }
  .yearcol::after{
    content:"";
    position:absolute;
    left:6px; top:22px; bottom:-22px;
    width:1px;
    background:var(--line);
  }
  .row:last-child .yearcol::after{display:none;}
  .yearcol .dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--red);
    margin-right:6px;
    vertical-align:middle;
    box-shadow:0 0 0 3px rgba(182,41,28,0.15);
  }

  .card h2{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:21px;
    margin:0 0 2px;
    letter-spacing:0.01em;
  }
  .artist{
    font-size:13px;
    color:var(--ink-dim);
    margin:0 0 4px;
    font-style:italic;
  }

  .desc{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 10px;
    font-family:'JetBrains Mono',monospace;
  }
  .desc::before{ content:"› "; color:var(--steel); }

  .stamp{
    display:inline-block;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--brass);
    border:1.5px solid var(--brass);
    padding:3px 9px 4px;
    border-radius:2px;
    transform:rotate(-2deg);
    cursor:help;
    background:rgba(169,138,74,0.06);
    margin-bottom:12px;
    position:relative;
  }
  .stamp:hover{background:rgba(169,138,74,0.14);}

  .genre-desc{
    display:none;
    font-size:13px;
    line-height:1.55;
    color:var(--ink-dim);
    border-left:2px solid var(--steel);
    padding:4px 0 4px 12px;
    margin:0 0 14px;
    max-width:560px;
  }
  .genre-desc.open{display:block;}

  .picker{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  select.vid-select{
    background:var(--bg-raised);
    color:var(--ink);
    border:1px solid var(--line);
    padding:9px 10px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    border-radius:2px;
    outline:none;
  }
  select.vid-select:focus{border-color:var(--brass);}

  button.play-btn{
    background:var(--red);
    color:#fff0e8;
    border:none;
    padding:9px 16px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  button.play-btn:hover{background:var(--red-bright);}
  button.play-btn.is-playing{background:var(--steel);color:var(--ink);}

  a.open-link{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    text-decoration:none;
    border-bottom:1px dotted var(--muted);
  }
  a.open-link:hover{color:var(--ink-dim);}

  .player-wrap{
    margin-top:14px;
    aspect-ratio:16/9;
    max-width:480px;
    background:#000;
    display:none;
    border:1px solid var(--line);
  }
  .player-wrap.open{display:block;}
  .player-wrap iframe{width:100%;height:100%;border:0;display:block;}

  .no-results{
    text-align:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    padding:60px 0;
    display:none;
  }
  .no-results.show{display:block;}

  footer{
    text-align:center;
    padding:36px 24px 60px;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--muted);
    border-top:1px solid var(--line);
  }
  footer a{color:var(--muted);}

  @media (max-width:560px){
    .row{grid-template-columns:40px 1fr;}
    .yearcol{font-size:11px;}
  }
</style>
</head>
<body>

<header class="site-head">
  <div class="head-inner">
    <span class="eyebrow" id="eyebrow"></span>
    <h1 class="title">VIDEO CHECK</h1>
    <p class="sub">A chronological walk through the {{QUIZ_NAME}} tracks, one row per track. Pick a track, pick a candidate clip from the dropdown, and play it to confirm it's the right one.</p>
    <div class="controls">
      <input id="search" type="text" placeholder="Filter by title, artist or genre…" />
      <span id="count"></span>
    </div>
  </div>
</header>

<main id="timeline"></main>
<p class="no-results" id="noResults">— nothing matches that filter —</p>

<footer>{{FOOTER_HTML}}</footer>

<script src="data.js"></script>
<script>
(function(){
  const SOURCE_LABEL = '{{SOURCE_LABEL}}';
  const timelineEl = document.getElementById('timeline');
  const searchEl = document.getElementById('search');
  const countEl = document.getElementById('count');
  const noResultsEl = document.getElementById('noResults');
  const eyebrowEl = document.getElementById('eyebrow');

  const sorted = questions.slice().sort((a,b)=>a.year-b.year);
  eyebrowEl.textContent = `${sorted.length} TRACKS · ${sorted[0].year}–${sorted[sorted.length-1].year} · ${SOURCE_LABEL}`;

  function decadeOf(year){ return Math.floor(year/10)*10; }

  function buildRow(entry, idx){
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.search = (entry.title+' '+entry.artist+' '+entry.description+' '+entry.genre.title).toLowerCase();

    const ycol = document.createElement('div');
    ycol.className = 'yearcol';
    ycol.innerHTML = `<span class="dot"></span>${entry.year}`;

    const card = document.createElement('div');
    card.className = 'card';

    const h2 = document.createElement('h2');
    h2.textContent = entry.title;
    const artist = document.createElement('div');
    artist.className = 'artist';
    artist.textContent = entry.artist;

    const descLine = document.createElement('div');
    descLine.className = 'desc';
    descLine.textContent = entry.description;

    const stamp = document.createElement('span');
    stamp.className = 'stamp';
    stamp.textContent = entry.genre.title;
    stamp.title = 'Click for genre description';

    const desc = document.createElement('div');
    desc.className = 'genre-desc';
    desc.textContent = entry.genre.description;
    stamp.addEventListener('click', ()=> desc.classList.toggle('open'));

    const picker = document.createElement('div');
    picker.className = 'picker';

    const select = document.createElement('select');
    select.className = 'vid-select';
    entry.videos.forEach((vid, i)=>{
      const opt = document.createElement('option');
      opt.value = vid;
      opt.textContent = `Clip ${i+1}  ·  ${vid}`;
      select.appendChild(opt);
    });

    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.textContent = '▶ Play';

    const openLink = document.createElement('a');
    openLink.className = 'open-link';
    openLink.target = '_blank';
    openLink.rel = 'noopener';
    openLink.textContent = 'open on youtube ↗';

    function currentUrl(){ return `https://www.youtube.com/watch?v=${select.value}`; }
    openLink.href = currentUrl();

    const playerWrap = document.createElement('div');
    playerWrap.className = 'player-wrap';

    let playing = false;
    function loadCurrent(){
      playerWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${select.value}?autoplay=1" allow="accelerate-autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    }

    playBtn.addEventListener('click', ()=>{
      playing = !playing;
      if(playing){
        loadCurrent();
        playerWrap.classList.add('open');
        playBtn.textContent = '■ Stop';
        playBtn.classList.add('is-playing');
      } else {
        playerWrap.classList.remove('open');
        playerWrap.innerHTML = '';
        playBtn.textContent = '▶ Play';
        playBtn.classList.remove('is-playing');
      }
    });

    select.addEventListener('change', ()=>{
      openLink.href = currentUrl();
      if(playing) loadCurrent();
    });

    picker.appendChild(select);
    picker.appendChild(playBtn);
    picker.appendChild(openLink);

    card.appendChild(h2);
    card.appendChild(artist);
    card.appendChild(descLine);
    card.appendChild(stamp);
    card.appendChild(desc);
    card.appendChild(picker);
    card.appendChild(playerWrap);

    row.appendChild(ycol);
    row.appendChild(card);
    return row;
  }

  let lastDecade = null;
  sorted.forEach((entry, idx)=>{
    const d = decadeOf(entry.year);
    if(d !== lastDecade){
      const divider = document.createElement('div');
      divider.className = 'decade';
      divider.textContent = d + 's';
      divider.dataset.decade = d;
      timelineEl.appendChild(divider);
      lastDecade = d;
    }
    timelineEl.appendChild(buildRow(entry, idx));
  });

  function applyFilter(){
    const q = searchEl.value.trim().toLowerCase();
    let visible = 0;
    Array.from(timelineEl.querySelectorAll('.row')).forEach(row=>{
      const match = !q || row.dataset.search.includes(q);
      row.style.display = match ? '' : 'none';
      if(match) visible++;
    });
    // hide a decade header if no row until the next header is visible
    const children = Array.from(timelineEl.children);
    children.forEach((el,i)=>{
      if(el.classList.contains('decade')){
        let j = i+1, anyRowVisible = false;
        while(j<children.length && !children[j].classList.contains('decade')){
          if(children[j].style.display !== 'none') anyRowVisible = true;
          j++;
        }
        el.style.display = anyRowVisible ? '' : 'none';
      }
    });
    countEl.textContent = `${visible} / ${sorted.length} tracks`;
    noResultsEl.classList.toggle('show', visible===0);
  }

  searchEl.addEventListener('input', applyFilter);
  applyFilter();
})();
</script>
</body>
</html>
