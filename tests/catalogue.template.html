<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{QUIZ_NAME}} — Catalogue</title>
<!-- Migrated from gitlab.com/lenzbeyer/art-mystery-test (#58) and generalized
     (#58/#59): a QA "catalogue" for a quiz's question set, fetched LIVE from the
     quiz's content file on GitHub so it never goes stale. Works for picture
     quizzes (shows the artwork/screenshot) and text quizzes (shows the entry +
     description). The "Check Wikipedia links" button verifies every entry's
     wiki_title resolves to a real article. {{QUIZ_NAME}}, {{DATA_URL}} and
     {{DATA_LABEL}} are filled in per quiz by tools/build-catalogues.mjs. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#EFEAE0;
    --wall-deep:#E6DFD0;
    --ink:#2A2521;
    --brass:#9C7A3C;
    --brass-light:#C9A227;
    --card:#FFFFFF;
    --muted:#8A8275;
    --rule:#D8CFC0;
    --ok:#3f8f5a;
    --bad:#c0392b;
    --shadow: 0 1px 2px rgba(42,37,33,.06), 0 8px 24px rgba(42,37,33,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--wall);
    background-image:radial-gradient(ellipse at top, var(--wall-deep), var(--wall) 60%);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  a{color:var(--brass); text-decoration:none;}
  a:hover{text-decoration:underline;}

  header.top{
    position:sticky; top:0; z-index:20;
    background:rgba(239,234,224,.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--rule);
    padding:18px 28px 16px;
  }
  .brand{ display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:12px; max-width:1280px; margin:0 auto 14px; }
  .brand h1{ font-family:'Fraunces', serif; font-weight:600; font-size:28px; margin:0; letter-spacing:.2px; }
  .brand h1 .accent{ font-style:italic; color:var(--brass); font-weight:500;}
  .brand .sub{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .count-pill{ font-family:'Inter', sans-serif; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--brass); border:1px solid var(--brass); border-radius:999px; padding:5px 12px; white-space:nowrap; }

  .controls{ max-width:1280px; margin:0 auto; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .controls input[type="search"]{ flex:1 1 220px; font-family:'Inter', sans-serif; font-size:14px; padding:10px 14px; border:1px solid var(--rule); border-radius:8px; background:var(--card); color:var(--ink); outline:none; }
  .controls input[type="search"]:focus{ border-color:var(--brass); }
  .controls select, .controls button{ font-family:'Inter', sans-serif; font-size:13px; padding:10px 12px; border:1px solid var(--rule); border-radius:8px; background:var(--card); color:var(--ink); cursor:pointer; }
  .controls button.check{ border-color:var(--brass); color:var(--brass); font-weight:600; }
  .controls button.check:hover{ background:var(--brass); color:#fff; }
  .controls button:disabled{ opacity:.6; cursor:default; }
  #linkSummary{ font-size:12.5px; color:var(--muted); }
  #linkSummary .ok{ color:var(--ok); font-weight:600; }
  #linkSummary .bad{ color:var(--bad); font-weight:600; }

  main{ max-width:1280px; margin:0 auto; padding:28px; }
  #status{ text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; }
  #status .spinner{ width:22px; height:22px; margin:0 auto 14px; border:2px solid var(--rule); border-top-color:var(--brass); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:22px 18px; }
  figure.piece{ margin:0; cursor:pointer; background:var(--card); border-radius:3px; box-shadow:var(--shadow); overflow:hidden; transition:transform .18s ease, box-shadow .18s ease; display:flex; flex-direction:column; position:relative; }
  figure.piece:hover{ transform:translateY(-3px); box-shadow:0 4px 8px rgba(42,37,33,.1), 0 16px 30px rgba(42,37,33,.13); }
  .frame{ background:#111; aspect-ratio:4/3; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  figure.textonly .frame{ display:none; }
  figcaption.plaque{ padding:12px 14px 14px; border-top:1px solid var(--rule); }
  figure.textonly figcaption.plaque{ border-top:none; }
  figcaption.plaque .ttl{ font-family:'Fraunces', serif; font-style:italic; font-weight:500; font-size:15px; line-height:1.3; margin-bottom:6px; }
  figcaption.plaque .meta{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--brass); display:flex; justify-content:space-between; gap:8px; }
  figcaption.plaque .meta .artist{ color:var(--muted); }
  figcaption.plaque .desc{ font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.45; }

  /* Wikipedia link status dot */
  .status-dot{ position:absolute; top:8px; right:8px; width:12px; height:12px; border-radius:50%; background:var(--rule); border:1px solid rgba(0,0,0,.15); z-index:2; }
  .status-dot.ok{ background:var(--ok); }
  .status-dot.bad{ background:var(--bad); }
  .status-dot.checking{ background:var(--brass-light); animation:pulse 1s ease-in-out infinite; }
  @keyframes pulse{ 50%{ opacity:.4; } }

  #empty{ display:none; text-align:center; color:var(--muted); padding:60px 20px; }

  .overlay{ position:fixed; inset:0; background:rgba(20,17,14,.72); display:none; align-items:center; justify-content:center; padding:24px; z-index:50; }
  .overlay.open{ display:flex; }
  .panel{ background:var(--card); max-width:920px; width:100%; max-height:88vh; overflow:auto; border-radius:4px; display:grid; grid-template-columns:1.1fr 1fr; box-shadow:0 30px 80px rgba(0,0,0,.4); }
  .panel.noimg{ grid-template-columns:1fr; max-width:560px; }
  @media (max-width:680px){ .panel{ grid-template-columns:1fr; } }
  .panel .img-side{ background:#111; display:flex; align-items:center; justify-content:center; }
  .panel .img-side img{ width:100%; height:100%; object-fit:contain; max-height:88vh; }
  .panel .info-side{ padding:30px 28px; position:relative; }
  .panel .close{ position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:50%; border:1px solid var(--rule); background:var(--wall); cursor:pointer; font-size:16px; line-height:1; color:var(--ink); }
  .panel .eyebrow{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--brass); margin-bottom:10px; }
  .panel h2{ font-family:'Fraunces', serif; font-style:italic; font-weight:500; font-size:26px; margin:0 0 6px; line-height:1.2; }
  .panel .artist-line{ color:var(--muted); font-size:14px; margin-bottom:18px; }
  .panel .desc-line{ font-size:14px; line-height:1.5; margin-bottom:18px; }
  .panel .incipit{ font-size:13.5px; line-height:1.6; color:var(--ink); margin:0 0 4px;
    max-height:34vh; overflow:auto; padding:12px 14px; background:var(--wall);
    border-left:3px solid var(--brass); border-radius:0 6px 6px 0; }
  .panel .incipit em{ color:var(--muted); }
  .panel hr{ border:none; border-top:1px solid var(--rule); margin:18px 0; }
  .panel dl{ display:grid; grid-template-columns:auto 1fr; gap:8px 14px; font-size:13px; margin:0 0 18px; }
  .panel dt{ color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-size:10.5px; padding-top:2px;}
  .panel dd{ margin:0; }
  .panel .wiki-link{ display:inline-flex; align-items:center; gap:6px; font-size:13px; border:1px solid var(--brass); color:var(--brass); padding:8px 14px; border-radius:999px; }
  .panel .wiki-link:hover{ background:var(--brass); color:#fff; text-decoration:none; }

  footer{ text-align:center; color:var(--muted); font-size:12px; padding:30px 20px 50px; }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div>
      <h1>{{QUIZ_NAME}} <span class="accent">Catalogue</span></h1>
      <div class="sub">A working view of the question set</div>
    </div>
    <div class="count-pill" id="countPill">loading…</div>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search by title, author or description…" />
    <select id="sort">
      <option value="year-asc">Year — oldest first</option>
      <option value="year-desc">Year — newest first</option>
      <option value="title-asc">Title — A to Z</option>
    </select>
    <button class="check" id="checkBtn">Check Wikipedia links</button>
    <span id="linkSummary"></span>
  </div>
</header>

<main>
  <div id="status"><div class="spinner"></div>Fetching the question set from GitHub…</div>
  <div class="grid" id="grid"></div>
  <div id="empty">No entries match that search.</div>
</main>

<footer>Data fetched live from <code>{{DATA_LABEL}}</code></footer>

<div class="overlay" id="overlay"><div class="panel" id="panel"></div></div>

<script>
const DATA_URL = "{{DATA_URL}}";
let allItems = [];

function formatYear(y){
  if (y < 0) return Math.abs(y).toLocaleString() + " BCE";
  return y.toLocaleString() + " CE";
}
function wikiUrl(wikiTitle){
  return "https://en.wikipedia.org/wiki/" + encodeURIComponent(wikiTitle).replace(/%20/g, "_");
}
function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function authorOf(it){ return (it.artist || it.author || "").replace(/_/g," "); }

async function loadData(){
  const statusEl = document.getElementById('status');
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    // Generalized: matches `export const <name> = [ ... ];` (questions, historicEvents, works…)
    const match = text.match(/export const \w+\s*=\s*(\[[\s\S]*\]);?\s*$/);
    if(!match) throw new Error("Could not locate the data array in the file");
    // Tolerate trailing commas (some content files have `},\n]`).
    const json = match[1].replace(/,(\s*[\]}])/g, '$1');
    allItems = JSON.parse(json);
    allItems.forEach((it, i) => it._i = i);
    statusEl.style.display = 'none';
    document.getElementById('countPill').textContent = allItems.length + " entries";
    render();
  }catch(err){
    statusEl.innerHTML = '<strong>Could not load the data.</strong><br>' + escapeHtml(err.message) +
      '<br><br>If this is a network/CORS issue, open this page from a server rather than from a file.';
  }
}

function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sortMode = document.getElementById('sort').value;

  let items = allItems.filter(it =>
    !q || it.title.toLowerCase().includes(q) || authorOf(it).toLowerCase().includes(q) || (it.description||"").toLowerCase().includes(q)
  );
  items = items.slice().sort((a,b) => {
    if(sortMode === 'year-asc') return a.year - b.year;
    if(sortMode === 'year-desc') return b.year - a.year;
    if(sortMode === 'title-asc') return a.title.localeCompare(b.title);
    return 0;
  });

  grid.innerHTML = '';
  empty.style.display = items.length ? 'none' : 'block';

  items.forEach(it => {
    const fig = document.createElement('figure');
    fig.className = 'piece' + (it.image ? '' : ' textonly');
    const author = authorOf(it);
    const frame = it.image ? `<div class="frame"><img src="${escapeHtml(it.image)}" alt="${escapeHtml(it.title)}" loading="lazy" /></div>` : '';
    const metaLeft = author ? `<span class="artist">${escapeHtml(author)}</span>` : `<span class="artist"></span>`;
    const desc = (!it.image && it.description) ? `<div class="desc">${escapeHtml(it.description)}</div>` : '';
    fig.innerHTML = `
      <span class="status-dot" data-dot="${it._i}" title="Wikipedia link not checked yet"></span>
      ${frame}
      <figcaption class="plaque">
        <div class="ttl">${escapeHtml(it.title)}</div>
        <div class="meta">${metaLeft}<span>${formatYear(it.year)}</span></div>
        ${desc}
      </figcaption>`;
    fig.addEventListener('click', () => openDetail(it));
    grid.appendChild(fig);
    if(it._status) applyDot(it._i, it._status);
  });
}

function applyDot(i, status){
  document.querySelectorAll(`[data-dot="${i}"]`).forEach(dot => {
    dot.classList.remove('ok','bad','checking');
    if(status) dot.classList.add(status);
    dot.title = status === 'ok' ? 'Wikipedia link OK' : status === 'bad' ? 'Wikipedia link MISSING' : status === 'checking' ? 'checking…' : 'not checked';
  });
}

// ---- Wikipedia summary (incipit) + link checker (#59, #61) ----
// The REST summary endpoint returns both the article's lead extract (the same
// incipit the in-game "more" dialog shows) and whether it's a disambiguation
// page — so one fetch both verifies the link and gives us the incipit (#61).
async function fetchSummary(it){
  if(it._summary !== undefined) return it._summary; // cached (incl. null on failure)
  if(!it.wiki_title){ it._status = 'bad'; it._summary = null; return null; }
  const url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(it.wiki_title);
  for(let a=0; a<3; a++){
    try{
      const r = await fetch(url, { headers: { 'Accept':'application/json' } });
      if(r.status === 200){
        const j = await r.json();
        it._status = (j.type === 'disambiguation') ? 'bad' : 'ok';
        it._summary = { extract: j.extract || '', disambiguation: j.type === 'disambiguation' };
        return it._summary;
      }
      if(r.status === 404){ it._status = 'bad'; it._summary = null; return null; }
      if(r.status === 429 || r.status >= 500){ await new Promise(s=>setTimeout(s,600*(a+1))); continue; }
      it._status = 'bad'; it._summary = null; return null;
    }catch(e){ await new Promise(s=>setTimeout(s,400*(a+1))); }
  }
  it._status = 'bad'; it._summary = null; return null;
}
async function checkOne(it){
  const s = await fetchSummary(it);
  return !!(s && !s.disambiguation);
}

let checking = false;
async function checkAllLinks(){
  if(checking) return;
  checking = true;
  const btn = document.getElementById('checkBtn');
  const summary = document.getElementById('linkSummary');
  btn.disabled = true; btn.textContent = 'Checking…';
  allItems.forEach(it => { it._status = 'checking'; applyDot(it._i, 'checking'); });

  let ok = 0, bad = 0, done = 0;
  const CONC = 6;
  let idx = 0;
  async function worker(){
    while(idx < allItems.length){
      const it = allItems[idx++];
      const good = await checkOne(it);
      good ? ok++ : bad++;
      done++;
      applyDot(it._i, it._status);
      summary.innerHTML = `<span class="ok">${ok} OK</span> · <span class="bad">${bad} problem${bad===1?'':'s'}</span> · ${done}/${allItems.length}`;
    }
  }
  await Promise.all(Array.from({length:CONC}, worker));
  btn.disabled = false; btn.textContent = 'Re-check Wikipedia links';
  const broken = allItems.filter(it => it._status === 'bad');
  if(broken.length){
    summary.innerHTML = `<span class="ok">${ok} OK</span> · <span class="bad">${bad} problems</span> — see red dots; click an entry for its wiki ref.`;
    console.warn('Broken/missing Wikipedia links:', broken.map(b => `${b.title} -> ${b.wiki_title}`));
  } else {
    summary.innerHTML = `<span class="ok">All ${ok} Wikipedia links OK</span>`;
  }
  checking = false;
}

let currentDetail = null;
function openDetail(it){
  currentDetail = it;
  const panel = document.getElementById('panel');
  const author = authorOf(it);
  const hasImg = !!it.image;
  panel.className = 'panel' + (hasImg ? '' : ' noimg');
  const imgSide = hasImg ? `<div class="img-side"><img src="${escapeHtml(it.image)}" alt="${escapeHtml(it.title)}" /></div>` : '';
  const subline = (author ? escapeHtml(author) + ' · ' : '') + formatYear(it.year);
  const descLine = it.description ? `<div class="desc-line">${escapeHtml(it.description)}</div>` : '';
  const statusTxt = it._status === 'ok' ? '✓ OK' : it._status === 'bad' ? '✗ missing / disambiguation' : 'not checked';
  // Wikipedia incipit (#61): show the cached extract, else a loading line we fill in.
  const incipitInner = it._summary
    ? (it._summary.extract ? escapeHtml(it._summary.extract) : '<em>(no extract — likely a disambiguation or stub page)</em>')
    : (it.wiki_title ? 'Loading Wikipedia incipit…' : '<em>(no wiki reference)</em>');
  panel.innerHTML = `
    ${imgSide}
    <div class="info-side">
      <button class="close" id="closeBtn">&times;</button>
      <div class="eyebrow">Catalogue entry</div>
      <h2>${escapeHtml(it.title)}</h2>
      <div class="artist-line">${subline}</div>
      ${descLine}
      <div class="incipit" id="incipit">${incipitInner}</div>
      <hr/>
      <dl>
        ${author ? `<dt>Author</dt><dd>${escapeHtml(author)}</dd>` : ''}
        <dt>Year</dt><dd>${formatYear(it.year)}</dd>
        <dt>Wiki ref</dt><dd>${escapeHtml(it.wiki_title || '—')}</dd>
        <dt>Link</dt><dd>${statusTxt}</dd>
      </dl>
      ${it.wiki_title ? `<a class="wiki-link" href="${wikiUrl(it.wiki_title)}" target="_blank" rel="noopener">Open on Wikipedia ↗</a>` : ''}
    </div>`;
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
  document.getElementById('overlay').classList.add('open');

  // Lazily load the incipit if we haven't fetched this entry's summary yet (#61).
  if(it._summary === undefined && it.wiki_title){
    const openedFor = it;
    fetchSummary(it).then(s => {
      const el = document.getElementById('incipit');
      if(!el || !document.getElementById('overlay').classList.contains('open')) return;
      if(openedFor !== currentDetail) return; // a different entry is open now
      el.innerHTML = s && s.extract ? escapeHtml(s.extract)
        : '<em>(no extract — likely a disambiguation or stub page)</em>';
      applyDot(it._i, it._status); // we now know the link status too
    });
  }
}
function closeDetail(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if(e.target.id === 'overlay') closeDetail(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDetail(); });

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort').addEventListener('change', render);
document.getElementById('checkBtn').addEventListener('click', checkAllLinks);

loadData();
</script>
</body>
</html>
