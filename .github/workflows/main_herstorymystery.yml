# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - HerstoryMystery

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore backend dependencies
        run: dotnet restore GameStateApi/GameStateApi.csproj

      - name: Copy frontend files into backend wwwroot
        run: |
          mkdir -p GameStateApi/wwwroot
          cp -r WebFrontend/wwwroot/* GameStateApi/wwwroot/

      - name: Build backend
        run: dotnet build GameStateApi/GameStateApi.csproj --configuration Release

      - name: Publish combined app
        run: dotnet publish GameStateApi/GameStateApi.csproj --configuration Release --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: combined-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: combined-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'HerstoryMystery'
          slot-name: 'Production'
          package: ./
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_80F8D75116244437978BCFB7EE7FD565 }}

      - name: Write base URL to config file
        run: |
          echo "{\"baseUrl\": \"${{ steps.deploy-to-webapp.outputs.webapp-url }}\"}" > ./wwwroot/config.json
          cp ./wwwroot/config.json GameStateApi/wwwroot/config.json
          jq ".BaseUrl = \"${{ steps.deploy-to-webapp.outputs.webapp-url }}\"" GameStateApi/appsettings.Production.json > GameStateApi/appsettings.Production.tmp.json
          mv GameStateApi/appsettings.Production.tmp.json GameStateApi/appsettings.Production.json
