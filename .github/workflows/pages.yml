# Deploys the quiz frontends as static sites to GitHub Pages, separately from the
# GameState API (which stays on Azure). Each frontend is built into its own
# sub-folder with base-path-independent (relative) asset references, so it works
# both at user.github.io/<repo>/<app>/ and when mapped to a subdomain.

name: Deploy frontends to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'QuizEngine/wwwroot/**'
      - 'HistoryMystery/wwwroot/**'
      - 'HerstoryMystery/wwwroot/**'
      - 'MetalMystery/wwwroot/**'
      - 'ArtMystery/wwwroot/**'
      - 'ArtMusicMystery/wwwroot/**'
      - 'TechnoMystery/wwwroot/**'
      - 'GameMystery/wwwroot/**'
      - 'LiteratureMystery/wwwroot/**'
      - 'tools/build-web.mjs'
      - 'tools/build-tests.mjs'
      - 'tools/build-catalogues.mjs'
      - 'tests/**'
      - 'MysteryQuizzes/wwwroot/**'
      - 'mobile/apps.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify API base address is configured
        # Fail fast instead of silently shipping the localhost default, which
        # would make multiplayer break with a cross-origin error in production.
        env:
          API_BASE_ADDRESS: ${{ secrets.API_BASE_ADDRESS }}
        run: |
          if [ -z "$API_BASE_ADDRESS" ]; then
            echo "::error::Repository secret API_BASE_ADDRESS is not set. Deployed frontends would point at localhost. Set it in Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Build static frontends
        # API_BASE_ADDRESS secret points the deployed frontends at the Azure API.
        env:
          API_BASE_ADDRESS: ${{ secrets.API_BASE_ADDRESS }}
        run: |
          for app in history herstory metal art artmusic techno game literature; do
            node tools/build-web.mjs "$app" "dist/$app"
          done
          # The MysteryQuizzes overview (#12) is the site root, linking to the
          # quizzes (sub-folders here; subdomains in production).
          cp -r MysteryQuizzes/wwwroot/* dist/

      # Separate build for the "Video Check" QA pages (#53, migrated from
      # gitlab.com/lenzbeyer/metal-mystery-test). A GitHub repo has a single
      # Pages site, so rather than a competing workflow these are built on their
      # own into a grouped /video-check/ section of the same artifact.
      - name: Build Video Check QA pages
        run: node tools/build-tests.mjs dist/video-check

      # Separate build for the "Catalogue" QA pages (#58/#59, migrated from
      # gitlab.com/lenzbeyer/art-mystery-test): a browsable view of each quiz's
      # question set with a live Wikipedia link checker. Published under
      # /catalogue/<quiz>/ in the same Pages artifact.
      - name: Build Catalogue QA pages
        run: node tools/build-catalogues.mjs dist/catalogue

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
